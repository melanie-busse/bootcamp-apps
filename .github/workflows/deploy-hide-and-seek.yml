name: Hide and Seek CI

on:
  push:
    paths:
      - 'apps/hide-and-seek/**'
  pull_request:
    paths:
      - 'apps/hide-and-seek/**'

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten (Node 22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Caching hier entfernt, um Pfad-Fehler im Monorepo zu vermeiden

      - name: Dependencies installieren
        run: npm ci
        working-directory: apps/hide-and-seek/backend

      - name: Backend bauen
        run: npm run build
        working-directory: apps/hide-and-seek/backend

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten (Node 22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dependencies installieren
        run: npm ci
        working-directory: apps/hide-and-seek/frontend

      - name: Frontend bauen
        run: npm run build
        working-directory: apps/hide-and-seek/frontend