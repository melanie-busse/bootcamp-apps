version: '3.8'

services:
  it-book:
    container_name: it-book
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    restart: unless-stopped

  bookmonkey-api:
    image: node:20-alpine
    container_name: bookmonkey-api
    command: npx bookmonkey-api
    ports:
      - "3005:3000"
    restart: always