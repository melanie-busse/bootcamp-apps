name: Deploy IT Book Library

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Zum Projektverzeichnis auf dem vServer wechseln (Pfad anpassen falls nötig)
            cd /var/www/it-book || exit
            
            echo ">>> Ziehe aktuellen Code aus dem Repository..."
            git pull origin main
            
            echo ">>> Baue Docker-Image und starte Container neu..."
            docker compose up -d --build
            
            echo ">>> Bereinige ungenutzte Docker-Images..."
            docker image prune -f
            
            echo ">>> Deployment erfolgreich abgeschlossen! 🎉"