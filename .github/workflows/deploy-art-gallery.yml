name: Deploy IT Book Library

on:
  push:
    branches:
      - main
    paths:
      - 'apps/it-book/**' # <-- Löst den Build aus, wenn sich hier etwas ändert
      - '.github/workflows/deploy-it-book.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Nutzt deinen exakten Secret-Namen
          script: |
            # 1. Falls der Haupt-Ordner gar nicht existiert, klonen
            [ -d ~/bootcamp-apps ] || git clone https://github.com/${{ github.repository }}.git ~/bootcamp-apps
            
            # 2. In den Hauptordner wechseln, Code aktualisieren und in den IT-Book-Ordner wechseln
            cd ~/bootcamp-apps && \
            git fetch --all && \
            git reset --hard origin/main && \
            cd apps/it-book && \
            docker compose up -d --build --force-recreate