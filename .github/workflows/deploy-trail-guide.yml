name: Deploy Trail Guide

on:
  push:
    branches:
      - main
    paths:
      - 'apps/trail-guide/**'
      - '.github/workflows/deploy-trail-guide.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH to vServer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bootcamp-apps && \
            git fetch --all && \
            git reset --hard origin/main && \
            
            cd apps/trail-guide && \
            docker compose up -d --build --force-recreate trail-guide