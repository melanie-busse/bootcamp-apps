version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3011:3000"
    networks:
      - game-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8086:80"
    networks:
      - game-network
    depends_on:
      - backend

networks:
  game-network:
    driver: bridge