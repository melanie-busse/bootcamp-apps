name: Deploy Quiz Game

on:
  push:
    branches:
      - main
    paths:
      - 'apps/quiz-game/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-quiz-game.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH to vServer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. In den Hauptordner wechseln und Code aktualisieren
            cd ~/bootcamp-apps && \
            git fetch --all && \
            git reset --hard origin/main && \
            
            # 2. Nur den neuen Quiz-Game Container bauen und restarten
            cd apps/quiz-game && \
            docker compose up -d --build --force-recreate quiz-game