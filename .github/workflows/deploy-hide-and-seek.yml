name: Deploy Hide and Seek

on:
  push:
    branches:
      - main
    paths:
      - 'apps/hide-and-seek/**'
      - '.github/workflows/deploy-hide-and-seek.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Sicherstellen, dass das Verzeichnis existiert. Wenn nicht, klonen.
            if [ ! -d "~/bootcamp-apps" ]; then
              git clone https://github.com/${{ github.repository }}.git ~/bootcamp-apps
            fi
            
            # 2. In das Hauptverzeichnis wechseln
            cd ~/bootcamp-apps
            
            # 3. Code absolut frisch ziehen und lokale Änderungen verwerfen
            git fetch origin main
            git reset --hard origin/main
            
            # 4. In den spezifischen Hide-and-Seek-Ordner wechseln
            cd apps/hide-and-seek
            
            # 5. Container stoppen, alte Netzwerke wegräumen und frisch bauen
            docker compose down --remove-orphans || true
            docker compose up -d --build