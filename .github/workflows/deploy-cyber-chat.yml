name: Deploy Cyber Chat

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cyber-chat/**'
      - '.github/workflows/deploy-cyber-chat.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bootcamp-apps || cd ~ && git clone https://github.com/${{ github.repository }}.git bootcamp-apps && cd bootcamp-apps
            git fetch --all
            git reset --hard origin/main
            
            # Direkt in den Ordner wechseln und mit der echten docker-compose.yml starten
            cd apps/cyber-chat
            docker compose up -d --build --force-recreate