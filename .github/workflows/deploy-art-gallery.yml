name: Deploy Art Gallery

on:
  push:
    branches:
      - main
    paths:
      - 'apps/art-gallery/**'
      - '.github/workflows/deploy-art-gallery.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Falls der Ordner gar nicht existiert, klonen (ohne Anführungszeichen bei der Tilde)
            [ -d ~/bootcamp-apps ] || git clone https://github.com/${{ github.repository }}.git ~/bootcamp-apps
            
            # 2. In den Ordner wechseln UND Code aktualisieren UND in den App-Ordner wechseln
            cd ~/bootcamp-apps && \
            git fetch --all && \
            git reset --hard origin/main && \
            cd apps/Art-Gallery && \
            docker compose up -d --build --force-recreate