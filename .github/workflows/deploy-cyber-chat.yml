name: Deploy Cyber Chat

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cyber-chat/**'
      - '.github/workflows/deploy-cyber-chat.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. In das Heimatverzeichnis wechseln und Projektordner ansteuern
            cd ~/bootcamp-apps || cd ~ && git clone https://github.com/${{ github.repository }}.git bootcamp-apps && cd bootcamp-apps
            
            # 2. Den neuesten Code von GitHub ziehen
            git fetch --all
            git reset --hard origin/main
            
            # 3. Die passende docker-compose.yml für Cyber-Chat vor Ort erstellen
            cat << 'EOF' > apps/cyber-chat/docker-compose.yml
            services:
              cyber-chat:
                build:
                  context: ../../
                  dockerfile: apps/cyber-chat/Dockerfile
                container_name: cyber-chat-app
                restart: always
                ports:
                  - "3002:3000"
                environment:
                  - NODE_ENV=production
                  - PORT=3000
                  - HOSTNAME=0.0.0.0
            EOF
            
            # 4. In den Ordner wechseln und mit Compose direkt vor Ort bauen & starten
            cd apps/cyber-chat
            docker compose up -d --build --force-recreate