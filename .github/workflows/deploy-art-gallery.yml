name: Deploy Art Gallery

on:
  push:
    branches:
      - main
    paths:
      - 'apps/Art-Gallery/**'
      - '.github/workflows/deploy-art-gallery.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Wir verbinden uns direkt per SSH und überlassen dem Server das Kommando
      - name: Deploy to vServer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. In das Heimatverzeichnis wechseln und Projektordner ansteuern
            # Passe den Pfad an, falls dein Repository-Ordner auf dem Server anders heißt!
            cd ~/bootcamp-apps || cd ~ && git clone https://github.com/${{ github.repository }}.git bootcamp-apps && cd bootcamp-apps
            
            # 2. Den neuesten Code von GitHub ziehen
            git fetch --all
            git reset --hard origin/main
            
            # 3. Die passende docker-compose.yml für die Art-Gallery vor Ort erstellen
            cat << 'EOF' > apps/Art-Gallery/docker-compose.yml
            services:
              art-gallery:
                build:
                  context: ../../
                  dockerfile: apps/Art-Gallery/Dockerfile
                container_name: art-gallery-app
                restart: always
                ports:
                  - "3001:3000"
                environment:
                  - NODE_ENV=production
                  - PORT=3000
                  - HOSTNAME=0.0.0.0
            EOF
            
            # 4. In den Ordner wechseln und mit Compose direkt vor Ort bauen & starten
            cd apps/Art-Gallery
            docker compose up -d --build --force-recreate