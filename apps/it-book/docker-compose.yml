version: '3.8'

services:
  it-book:
    container_name: it-book
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    restart: unless-stopped

  bookmonkey-api:
    build:
      dockerfile: apps/it-book/Dockerfile
    container_name: bookmonkey-api
    restart: always
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0