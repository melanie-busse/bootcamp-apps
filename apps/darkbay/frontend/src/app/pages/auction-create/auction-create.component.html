<div style="display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px 30px; border-bottom: 2px solid #334155; margin-bottom: 30px;">
  <div style="display: flex; align-items: center; gap: 20px;">
    <h1 style="color: #ffcc00; margin: 0; font-family: sans-serif; font-size: 1.5rem;">
      ⚔️ Neue Beute registrieren
    </h1>
    <a routerLink="/auctions" style="color: #38bdf8; text-decoration: none; font-weight: bold;">
      ← Zurück zur Bucht
    </a>
  </div>

  <button
    (click)="onLogout()"
    style="background: #ef4444; color: white; font-weight: bold; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;"
  >
    Taverne verlassen 🚶‍♂️💨
  </button>
</div>

<div style="max-width: 500px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: white;">

  <h2 style="color: #ffcc00; margin-top: 0; margin-bottom: 20px;">Auktionsdetails</h2>

  <form (ngSubmit)="onSubmit()">

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Gegenstand / Titel</label>
      <input
        type="text"
        name="title"
        [(ngModel)]="auctionData.title"
        placeholder="z.B. Verfluchter Kompass"
        style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box;"
        required
      >
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Beschreibung</label>
      <textarea
        name="description"
        [(ngModel)]="auctionData.description"
        placeholder="Beschreibe die Beute detailliert..."
        rows="4"
        style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; resize: vertical;"
        required
      ></textarea>
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Startpreis (Gold / €)</label>
      <input
        type="number"
        name="startPrice"
        [(ngModel)]="auctionData.startPrice"
        style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box;"
        required
      >
    </div>

    <div style="margin-bottom: 25px;">
      <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Auktionsende</label>
      <input
        type="datetime-local"
        name="endDate"
        [(ngModel)]="auctionData.endDate"
        style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box;"
        required
      >
    </div>

    @if (errorMessage) {
      <div style="color: #ef4444; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold;">
        ⚠️ {{ errorMessage }}
      </div>
    }
    @if (successMessage) {
      <div style="color: #22c55e; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold;">
        {{ successMessage }}
      </div>
    }

    <button
      type="submit"
      style="width: 100%; background: #e6a100; color: #0f172a; font-weight: bold; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.2s;"
      onmouseover="this.style.background='#cc8f00'"
      onmouseout="this.style.background='#e6a100'"
    >
      Auktion starten 🚀
    </button>

  </form>
</div>
