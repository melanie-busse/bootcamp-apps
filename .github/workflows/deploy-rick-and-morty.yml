name: Deploy Rick and Morty

on:
  push:
    branches:
      - main
    paths:
      - 'apps/rick-and-morty/**'
      - '.github/workflows/deploy-rick-and-morty.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH to vServer
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bootcamp-apps && \
            git fetch --all && \
            git reset --hard origin/main && \
            
            cd apps/rick-and-morty && \
            docker compose up -d --build --force-recreate rick-and-morty