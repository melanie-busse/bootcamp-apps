services:
  darkbay-backend:
    build:
      context: ../../
      dockerfile: apps/darkbay/backend/Dockerfile
    container_name: darkbay-backend-app
    restart: always
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0

  darkbay-frontend-angular:
    build:
      context: ../../
      dockerfile: apps/darkbay/frontend-angular/Dockerfile
    container_name: darkbay-frontend-app
    restart: always
    ports:
      - "3004:80"

  darkbay-frontend-next:
    container_name: darkbay-frontend-next
    build:
      context: ../../
      dockerfile: apps/darkbay/frontend-next/Dockerfile
    ports:
      - "3009:3000"
    environment:
      - DARKBAY_API_URL=http://darkbay-backend:3000
    restart: always
    depends_on:
      - darkbay-backend